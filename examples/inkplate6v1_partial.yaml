esphome:
  name: inkplate6v1-partial
  friendly_name: Inkplate 6 V1 Partial
  on_boot:
    priority: -100
    then:
      - component.update: my_inkplate6

esp32:
  framework:
    type: esp-idf
  variant: esp32

external_components:
  - source:
      type: local
      path: ../components

psram:
  mode: quad
  speed: 40MHz

logger:
  baud_rate: 115200
  hardware_uart: UART0

i2c:
  id: i2c_bus
  sda: GPIO21
  scl: GPIO22
  frequency: 100000

mcp23017:
  id: inkplate_mcp
  i2c_id: i2c_bus
  address: 0x20

display:
  platform: inkplate
  model: inkplate6v1
  id: my_inkplate6
  i2c_id: i2c_bus
  address: 0x48
  mcp23017_id: inkplate_mcp
  update_interval: never
  lambda: |-
    it.fill(COLOR_OFF);
    it.filled_rectangle(0, 0, 800, 600, COLOR_ON);
    it.filled_rectangle(10, 10, 780, 580, COLOR_OFF);

interval:
  - interval: 10s
    then:
      - lambda: |-
          static bool state = false;
          state = !state;
          id(my_inkplate6).filled_rectangle(300, 200, 200, 200,
              state ? COLOR_ON : COLOR_OFF);
          id(my_inkplate6).display_partial();
