esphome:
  name: inkplate6v2-test
  friendly_name: Inkplate 6 V2 Test

esp32:
  framework:
    type: esp-idf
  variant: esp32

external_components:
  - source:
      type: local
      path: ../components

psram:
  mode: quad
  speed: 40MHz

logger:
  baud_rate: 115200
  hardware_uart: UART0

# I2C bus — shared by TPS65186 (PMIC) and PCAL6416A (I/O expander)
i2c:
  id: i2c_bus
  sda: GPIO21
  scl: GPIO22
  frequency: 100000

# Internal I/O expander (PCAL6416A) — controls EPD panel signal lines
# Address 0x20 = Inkplate6 V2 internal expander (IO_INT_ADDR)
pca6416a:
  id: inkplate_pcal
  i2c_id: i2c_bus
  address: 0x20

display:
  platform: inkplate
  model: inkplate6v2
  id: my_inkplate6
  i2c_id: i2c_bus
  address: 0x48
  pca6416a_id: inkplate_pcal
  update_interval: never
  lambda: |-
    it.fill(COLOR_OFF);

# Grayscale test: 8-level gradient across full width every 30 s.
interval:
  - interval: 30s
    then:
      - lambda: |-
          id(my_inkplate6).set_grayscale_mode(true);
          for (int i = 0; i < 8; i++) {
            id(my_inkplate6).filled_rectangle(i * 100, 0, 100, 600, Color(i, i, i));
          }
          id(my_inkplate6).display_grayscale();
          id(my_inkplate6).set_grayscale_mode(false);
