esphome:
  name: inkplate6v1-bw
  friendly_name: Inkplate 6 V1 B&W

esp32:
  framework:
    type: esp-idf
  variant: esp32

external_components:
  - source:
      type: local
      path: ../components

psram:
  mode: quad
  speed: 40MHz

logger:
  baud_rate: 115200
  hardware_uart: UART0

i2c:
  id: i2c_bus
  sda: GPIO21
  scl: GPIO22
  frequency: 100000

# Internal I/O expander (MCP23017) — controls EPD panel signal lines
# Address 0x20 = Inkplate6 V1 internal expander (IO_INT_ADDR)
mcp23017:
  id: inkplate_mcp
  i2c_id: i2c_bus
  address: 0x20

font:
  - file: "gfonts://Roboto"
    id: font_body
    size: 48

display:
  platform: inkplate
  model: inkplate6v1
  id: my_inkplate6
  i2c_id: i2c_bus
  address: 0x48
  mcp23017_id: inkplate_mcp
  update_interval: 60s
  lambda: |-
    it.fill(COLOR_OFF);
    it.print(400, 300, id(font_body), COLOR_ON, display::TextAlign::CENTER, "Hello World");
