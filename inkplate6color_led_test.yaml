esphome:
  name: inkplate6color-led-test
  friendly_name: Inkplate 6 Color LED Test
  on_boot:
    priority: -100
    then:
      - component.update: my_inkplate6color

esp32:
  framework:
    type: esp-idf
  variant: esp32

external_components:
  - source:
      type: local
      path: components

psram:
  mode: quad
  speed: 40MHz

logger:
  baud_rate: 115200
  hardware_uart: UART0

i2c:
  sda: GPIO21
  scl: GPIO22
  frequency: 400kHz

pca6416a:
  - id: pcal
    address: 0x20

switch:
  - platform: gpio
    name: "Inkplate LED"
    id: led_switch
    pin:
      pca6416a: pcal
      number: 0
      mode:
        output: true
      inverted: false

interval:
  - interval: 500ms
    then:
      - switch.toggle: led_switch

spi:
  id: spi_display
  clk_pin: GPIO18
  mosi_pin: GPIO23

font:
  - file: "gfonts://Roboto"
    id: font_body
    size: 32

display:
  platform: inkplate_spi
  model: inkplate6color
  id: my_inkplate6color
  spi_id: spi_display
  rotation: 180°
  update_interval: never
  lambda: |-
    it.fill(Color(255, 255, 255));
    it.print(it.get_width() / 2, it.get_height() / 2, id(font_body),
             Color(0, 0, 0), display::TextAlign::CENTER, "LED Test");
